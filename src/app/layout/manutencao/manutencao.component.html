<div class="manutencao-container">
  <c4u-card titulo="Sistema em manutenção">
    <div class="maintenance-message">
      <div class="maintenance-icon" aria-hidden="true">
        <i class="ri-tools-fill"></i>
      </div>
      <p>Estamos realizando melhorias. Você será avisado pelos canais oficiais de comunicação quando a manutenção terminar.</p>
      <div class="maintenance-dots" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <button type="button" class="logout-btn" (click)="logout()">
        Sair e voltar ao login
      </button>
    </div>
  </c4u-card>
</div>
