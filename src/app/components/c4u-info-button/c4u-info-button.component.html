<div 
  class="info-button-wrapper" 
  #buttonWrapper
  (mouseenter)="onMouseEnter($event)" 
  (mousemove)="onMouseMove($event)"
  (mouseleave)="onMouseLeave()" 
  (click)="onClick($event)">
  <button 
    #infoButton
    type="button"
    class="info-button"
    [attr.aria-label]="'Informações sobre ' + infoKey"
    [attr.aria-describedby]="'tooltip-' + infoKey">
    <i class="ri-information-line" aria-hidden="true"></i>
  </button>
  
  <div 
    *ngIf="showTooltip && helpText"
    class="info-tooltip"
    [ngClass]="[
      'tooltip-' + computedPosition,
      align === 'end' ? 'tooltip-align-end' : '',
      align === 'start' ? 'tooltip-align-start' : ''
    ]"
    [id]="'tooltip-' + infoKey"
    [ngStyle]="tooltipStyle"
    role="tooltip">
    <p>{{ helpText }}</p>
  </div>
</div>
