<c4u-modal modalTitle="Perguntas frequentes">
  <div class="faq-body" flex direction="column" flexItem="1" scroll>
    <p class="faq-intro">
      Orientações sobre navegação entre equipes, filtros e uso dos insights de gestão.
    </p>

    <section *ngIf="faqItems.length > 0" class="faq-list-section" aria-labelledby="faq-list-title">
      <h4 id="faq-list-title" class="faq-section-title">
        <i class="ri-question-answer-line" aria-hidden="true"></i>
        Perguntas e respostas
      </h4>

      <ul class="faq-list" role="list">
        <li
          *ngFor="let item of faqItems; let i = index; trackBy: trackByIndex"
          class="faq-card"
          [ngClass]="['faq-theme--' + item.theme, isExpanded(i) ? 'faq-card--open' : '']"
          role="listitem">
          <button
            type="button"
            class="faq-card-header"
            (click)="toggleFaq(i)"
            [attr.aria-expanded]="isExpanded(i)"
            [attr.aria-controls]="'faq-panel-' + i"
            [attr.id]="'faq-header-' + i">
            <span class="faq-card-badge" aria-hidden="true">
              <i [class]="item.icon"></i>
            </span>
            <span class="faq-card-title">{{ item.title }}</span>
            <span class="faq-card-chevron" aria-hidden="true">
              <i class="ri-arrow-down-s-line" [class.faq-card-chevron--open]="isExpanded(i)"></i>
            </span>
          </button>

          <div
            *ngIf="isExpanded(i)"
            class="faq-card-body"
            role="region"
            [attr.id]="'faq-panel-' + i"
            [attr.aria-labelledby]="'faq-header-' + i">
            <p class="faq-answer">{{ item.body }}</p>
          </div>
        </li>
      </ul>
    </section>

    <p *ngIf="faqItems.length === 0" class="faq-empty">
      O conteúdo desta seção será publicado em breve.
    </p>
  </div>
</c4u-modal>
