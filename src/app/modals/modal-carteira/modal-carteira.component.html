<c4u-modal
  [modalTitle]="useBackendUserActions ? 'Carteira — entregas e ações' : 'Carteira de Clientes'"
  icon="ri-building-2-line"
  (closed)="onClose()">
  <div class="carteira-content">
    <p *ngIf="useBackendUserActions && !isLoading" class="carteira-hint">
      Cada linha é uma <strong>entrega</strong> (delivery). Toque para ver as tarefas daquela entrega.
    </p>
    <!-- Loading State -->
    <div *ngIf="isLoading" class="loading-state">
      <i class="ri-loader-4-line loading-icon"></i>
      <span>Carregando...</span>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading && clientes.length === 0" class="empty-state">
      <i class="ri-building-line empty-icon"></i>
      <span>Nenhum cliente encontrado</span>
    </div>

    <!-- Cliente List -->
    <div *ngIf="!isLoading && clientes.length > 0" class="cliente-list">
      <div 
        *ngFor="let cliente of clientes" 
        class="cliente-card"
        [class.expanded]="selectedListRowKey === getClienteRowKey(cliente)">
        
        <button 
          type="button" 
          class="cliente-header"
          (click)="selectCliente(cliente)"
          [attr.aria-expanded]="selectedListRowKey === getClienteRowKey(cliente)">
          <div class="cliente-info cliente-info-stack">
            <i
              class="cliente-icon"
              [class.ri-user-3-line]="useBackendUserActions && cliente.deliveryId"
              [class.ri-building-2-line]="!(useBackendUserActions && cliente.deliveryId)"></i>
            <div class="cliente-text-block">
              <span class="cliente-cnpj">{{ getClientePrimaryLabel(cliente) }}</span>
              <span class="delivery-meta" *ngIf="useBackendUserActions && cliente.deliveryId">
                <span class="delivery-badge">Entrega</span>
              </span>
            </div>
          </div>
          <div class="cliente-meta">
            <span class="action-count">{{ cliente.actionCount }} ações</span>
            <!-- KPI Indicator -->
            <c4u-kpi-circular-progress
              *ngIf="cliente.deliveryKpi"
              [label]="cliente.deliveryKpi.label"
              [current]="cliente.deliveryKpi.current"
              [target]="cliente.deliveryKpi.target"
              [superTarget]="cliente.deliveryKpi.superTarget"
              [color]="cliente.deliveryKpi.color"
              [unit]="cliente.deliveryKpi.unit"
              [size]="'small'"
              class="cliente-kpi">
            </c4u-kpi-circular-progress>
            <span *ngIf="!cliente.deliveryKpi" class="kpi-na">N/A</span>
            <i class="ri-arrow-down-s-line expand-icon" 
               [class.rotated]="selectedListRowKey === getClienteRowKey(cliente)"></i>
          </div>
        </button>

        <div class="cliente-actions" *ngIf="selectedListRowKey === getClienteRowKey(cliente)">
          <!-- Loading actions -->
          <div *ngIf="isLoadingActions" class="loading-actions">
            <i class="ri-loader-4-line loading-icon"></i>
            <span>Carregando ações...</span>
          </div>
          
          <!-- Actions list -->
          <ul *ngIf="!isLoadingActions" class="action-list">
            <li *ngFor="let action of selectedClienteActions" class="action-item">
              <div class="action-info">
                <span class="action-title">{{ action.title }}</span>
                <span class="action-player">{{ action.player }}</span>
              </div>
              <span class="action-date">{{ formatDate(action.created) }}</span>
            </li>
            <li *ngIf="selectedClienteActions.length === 0" class="no-actions">
              Nenhuma ação encontrada
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</c4u-modal>
